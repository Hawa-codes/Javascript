<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <title>Notes App</title>
</head>
<body>
    <div class="container">
        <div class="title">
            <h1>1. Notes App</h1>
            <p>Add, edit, delete and save your notes.</p>
        </div>
        <section class="card">
            <div class="top-bar">
                <span class="top-bar-title">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
                     <path stroke-linecap="round" stroke-linejoin="round" d="m3 3 1.664 1.664M21 21l-1.5-1.5m-5.485-1.242L12 17.25 4.5 21V8.742m.164-4.078a2.15 2.15 0 0 1 1.743-1.342 48.507 48.507 0 0 1 11.186 0c1.1.128 1.907 1.077 1.907 2.185V19.5M4.664 4.664 19.5 19.5" />
                    </svg>
                    <h3>My Notes</h3>
                </span>
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z" />
                </svg>
            </div>
            <div class="textarea">
                <textarea name="text" id="text">Add your notes here...</textarea>
                <button id="btn">Add</button>
            </div>
            <ul class="notes-list">
                <li class="note">
                    <div class="note-content">
                        <h3>JavaScript Basics</h3>
                        <p>Study arrays and objects today.</p>
                    </div>

                    <div class="note-buttons">
                        <button class="edit-btn">✏️</button>
                        <button class="delete-btn">🗑️</button>
                    </div>
                </li>

                <li class="note">
                    <div class="note-content">
                        <h3>Daily Goals</h3>
                        <p>Practice DOM manipulation for 1 hour.</p>
                    </div>

                    <div class="note-buttons">
                        <button class="edit-btn">✏️</button>
                        <button class="delete-btn">🗑️</button>
                    </div>
                </li>
</ul>
        </section>
    </div>
    <script src="./index.js"></script>
</body>
</html>
